<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊び方 | VTuber事務所シミュレーション</title>
  <script>
  /* =====================================================
      テキスト編集エリア（ここだけ編集すればOKです）
     ===================================================== */

  const PAGE = {

    /* ---------- 遊び方セクション一覧 ----------
       各セクションの設定：
         tag   … 左上の小さいラベル
         title … 見出し
         type  … "p"（文章）または "ul"（箇条書き）
         body  … type が "p" → 文字列（\n で改行）
                  type が "ul" → 配列（各項目を "" で囲む）
         outro … （任意）リストや文章のあとに続ける文章（\n で改行）
                  不要なら "" または削除

       不要なセクションは削除、追加したい場合はコピーして貼り付けてください。
    ---------------------------------------- */
    sections: [
      {
        tag:   "概要",
        title: "概要",
        type:  "ul",
        body:  [
          "全編無料",
          "パソコンやスマートフォンのブラウザ上で遊べます",
          "一回のプレイは約30〜60分",
          "セーブ機能つき"
        ],
        outro: "Vtuber事務所の社長となり、たくさんのVtuberを生み出して人気者に育てていくゲームです\nゲーム内は自動で年月が経ち、3年間経過するとエンディングを迎えます"
      },
      {
        tag:   "やること",
        title: "主なやること",
        type:  "ul",
        body:  [
          "魂オーディション＋ガワ発注をして、Vtuberをデビューさせる",
          "時間が経過すると登録者数が増えて、事務所レベルが上がる",
          "事務所レベルが上がると「イベント開催」ができるようになるので、たまに開催してみる",
          "各Vtuberの「夢」を叶えて喜ばせてあげよう",
          "Vtuberを増やそう",
          "3年経過するとエンディング",
          "事務所画面下部中央の「メニュー」を押すと、セーブ等ができます"
        ],
        outro: ""
      },
      {
        tag:   "コツ",
        title: "β版現時点でのコツ",
        type:  "p",
        body:  "現時点では「ほぼ運ゲー」になっています\n良いランダム結果を引けるかにすべてかかっているので、あまり真剣に攻略しようと頑張らないで、気楽に雰囲気を楽しんで下さい\nエンディングは、ゲームオーバー含めると全6種です\nが、辿り着くにはかなり難しいエンディングがあります。今後バランス調整を検討します",
        outro: ""
      }
    ],

    /* ---------- 一番下の注釈（不要なら ""） ---------- */
    footnote: ""

  };

  /* =====================================================
      ここから下は触らないでください
     ===================================================== */
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04040e;
      color: #fff;
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', Meiryo, sans-serif;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .page-label { font-size: 0.65rem; letter-spacing: 0.4em; color: #8070a8; text-transform: uppercase; margin-bottom: 12px; }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900;
      background: linear-gradient(135deg, #d080ff 0%, #80d0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 18px rgba(176,96,255,0.5));
    }
    .section { margin-bottom: 36px; border-left: 2px solid rgba(176,96,255,0.35); padding-left: 20px; }
    .section h2 { font-size: 1rem; font-weight: 700; color: #c080ff; letter-spacing: 0.1em; margin-bottom: 10px; }
    .section p, .section li { font-size: 0.88rem; line-height: 1.85; color: #cebee8; }
    .section ul { padding-left: 1.2em; margin-bottom: 4px; }
    .section li { margin-bottom: 4px; }
    .section .outro { margin-top: 12px; }
    .section .outro p { font-size: 0.88rem; line-height: 1.85; color: #cebee8; margin-bottom: 2px; }

    .back-link { display: inline-block; margin-top: 48px; font-size: 0.7rem; letter-spacing: 0.25em; color: #8070a8; text-decoration: none; transition: color 0.25s; }
    .back-link:hover { color: #c080ff; }
    hr { border: none; border-top: 1px solid rgba(176,96,255,0.1); margin: 48px 0; }
    .footnote { font-size: 0.72rem; color: #604870; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-label">HOW TO PLAY</div>
    <h1>遊び方</h1>

    <div id="sections-list"></div>

    <hr>
    <p class="footnote" id="footnote"></p>
    <a href="index.html" class="back-link">← タイトルへ戻る</a>
  </div>

  <script>
    var container = document.getElementById('sections-list');

    PAGE.sections.forEach(function(s) {
      var content = '';

      if (s.type === 'ul') {
        content += '<ul>' + s.body.map(function(i){ return '<li>' + i + '</li>'; }).join('') + '</ul>';
      } else {
        content += s.body.split('\n').map(function(l){ return '<p>' + l + '</p>'; }).join('');
      }

      if (s.outro) {
        content += '<div class="outro">' + s.outro.split('\n').map(function(l){ return '<p>' + l + '</p>'; }).join('') + '</div>';
      }

      container.innerHTML += '<div class="section">'
        + '<h2>' + s.title + '</h2>'
        + content
        + '</div>';
    });

    var fnEl = document.getElementById('footnote');
    if (PAGE.footnote) { fnEl.textContent = PAGE.footnote; } else { fnEl.style.display = 'none'; }
  </script>
</body>
</html>
